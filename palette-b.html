<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Jost',sans-serif;background:#0e0e16;}

/* CINEMATIC PHOTO REEL — full bleed, sliding */
.reel{position:fixed;inset:0;z-index:0;display:flex;animation:reelScroll 30s linear infinite;}
.reel-img{flex-shrink:0;width:40vw;height:100vh;object-fit:cover;filter:brightness(0.35) saturate(0.8);}

/* RADIAL GOLD VIGNETTE */
.vignette{position:fixed;inset:0;z-index:2;background:radial-gradient(ellipse at 50% 50%,rgba(14,14,22,0) 20%,rgba(14,14,22,0.92) 80%);}

/* GOLDEN PARTICLE CANVAS */
canvas{position:fixed;inset:0;z-index:3;pointer-events:none;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:1.8rem 3rem;border-bottom:1px solid rgba(212,175,55,0.15);}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:white;letter-spacing:0.15em;text-transform:uppercase;}
.nav-logo em{font-style:italic;color:#D4AF37;}
.nav-links{display:flex;gap:2.5rem;}
.nav-links a{text-decoration:none;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.45);transition:color 0.2s;}
.nav-links a:hover{color:#D4AF37;}
.nav-enter{padding:0.55rem 1.6rem;border:1px solid #D4AF37;color:#D4AF37;text-decoration:none;font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;transition:all 0.25s;}
.nav-enter:hover{background:#D4AF37;color:#0e0e16;}

/* CENTER HERO */
.center{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.pre{font-size:0.65rem;letter-spacing:0.4em;text-transform:uppercase;color:#D4AF37;margin-bottom:2rem;animation:riseUp 1s ease both;}
.pre::before,.pre::after{content:'—';margin:0 0.8rem;opacity:0.4;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(5rem,12vw,11rem);font-weight:300;color:white;line-height:0.88;letter-spacing:-0.02em;animation:riseUp 1s ease 0.2s both;}
h1 em{font-style:italic;color:#D4AF37;display:block;}
.rule{width:80px;height:1px;background:linear-gradient(90deg,transparent,#D4AF37,transparent);margin:2.2rem auto;animation:riseUp 1s ease 0.4s both;}
.sub{font-size:0.9rem;font-weight:200;color:rgba(255,255,255,0.45);letter-spacing:0.08em;line-height:1.9;max-width:420px;animation:riseUp 1s ease 0.5s both;margin-bottom:2.5rem;}
.btn-enter{display:inline-block;padding:1rem 3.5rem;border:1px solid rgba(212,175,55,0.6);color:#D4AF37;text-decoration:none;font-size:0.72rem;letter-spacing:0.25em;text-transform:uppercase;animation:riseUp 1s ease 0.7s both;transition:all 0.3s;position:relative;overflow:hidden;}
.btn-enter::before{content:'';position:absolute;inset:0;background:#D4AF37;transform:translateX(-101%);transition:transform 0.3s;}
.btn-enter:hover::before{transform:translateX(0);}
.btn-enter span{position:relative;z-index:1;transition:color 0.3s;}
.btn-enter:hover span{color:#0e0e16;}

/* BOTTOM PHOTO STRIP */
.strip{position:fixed;bottom:0;left:0;right:0;height:100px;z-index:15;overflow:hidden;display:flex;gap:3px;}
.strip-img{flex-shrink:0;width:160px;height:100px;overflow:hidden;animation:stripMove 25s linear infinite;opacity:0.35;border-top:1px solid rgba(212,175,55,0.2);}
.strip-img img{width:100%;height:100%;object-fit:cover;}
.strip-img:nth-child(even){animation-direction:reverse;animation-duration:18s;}

/* PALETTE BADGE */
.badge{position:fixed;top:1.5rem;left:50%;transform:translateX(-50%);z-index:100;background:rgba(212,175,55,0.12);border:1px solid rgba(212,175,55,0.3);color:#D4AF37;font-size:0.62rem;letter-spacing:0.25em;text-transform:uppercase;padding:0.35rem 1rem;}

@keyframes riseUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes reelScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes stripMove{from{transform:translateX(0)}to{transform:translateX(-200%)}}
</style>
</head>

<script>
// Gold particles
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const particles = Array.from({length:60},()=>({
  x:Math.random()*canvas.width, y:Math.random()*canvas.height,
  vx:(Math.random()-.5)*0.4, vy:-0.3-Math.random()*0.5,
  r:Math.random()*1.8, alpha:Math.random()
}));
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.alpha-=0.003;
    if(p.alpha<=0){p.x=Math.random()*canvas.width;p.y=canvas.height+10;p.alpha=0.8;}
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(212,175,55,${p.alpha})`; ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>
